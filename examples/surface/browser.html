<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>lykn Browser Test — Inline (Surface)</title>
  <script src="../../dist/lykn-browser.dev.js"></script>
</head>
<body>
  <h1>lykn Browser Test</h1>
  <div id="output"></div>

  <script type="text/lykn">
  (bind el (document:get-element-by-id "output"))
  (bind items #a("one" "two" "three"))
  (bind html (items:map (=> (item i)
    (template "<p>" (+ i 1) ". " item "</p>"))))
  (set! el:inner-HTML (html:join ""))
  </script>

  <p>If you see a numbered list above, the inline script worked.</p>
</body>
</html>
